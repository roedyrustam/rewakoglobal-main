<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="PT Nusantara Global Export" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Default title shown before React/Helmet hydrates. Each page overrides via Helmet. -->
    <title>PT Nusantara Global Export - Indonesian Premium Commodities Exporter</title>

    <!-- Default OG site identity (per-page tags managed by react-helmet-async) -->
    <meta property="og:site_name" content="PT Nusantara Global Export" />
    <meta property="og:image" content="/og-image.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PT Nusantara Global Export - Indonesian Premium Commodities" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
